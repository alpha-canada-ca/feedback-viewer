# Development Profile - Default settings
# This profile uses H2 database by default
# Note: Run with profiles "dev,h2" or just "h2" for database config

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# Logging Configuration
logging.level.root=INFO
logging.level.ca.gc.tbs=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JSON Content Configuration
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# File Upload Size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration (for development only - use secrets in production)
jwt.secret.key=dev-secret-key-for-testing-only-change-in-production-12345

# Application Configuration (for development)
pagesuccess.pythonPath=/usr/bin/python3
pagesuccess.pythonScriptPath=/tmp/python/

# Email Service (Notify) Configuration - placeholder values for development
notify.templateid.accountenabled=placeholder-account-enabled-template-id
notify.templateid.useractivationrequest=placeholder-activation-request-template-id
notify.apikey=placeholder-api-key

# Login URL
pagesuccess.loginURL=http://localhost:8080/login
