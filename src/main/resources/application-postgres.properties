# PostgreSQL Database Configuration (Production Profile)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:feedbackdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA/Hibernate Settings for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL specific settings
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# DataTables JPA configuration
spring.jpa.open-in-view=true

# Reduce verbose logging
logging.level.org.hibernate.type.descriptor.sql=INFO
logging.level.org.hibernate.SQL=INFO

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# JWT Configuration (for development only - use secrets in production)
jwt.secret.key=dev-secret-key-for-testing-only-change-in-production-12345

# Application Configuration
pagesuccess.pythonPath=/usr/bin/python3
pagesuccess.pythonScriptPath=/tmp/python/

# Email Service (Notify) Configuration - placeholder values
notify.templateid.accountenabled=placeholder-account-enabled-template-id
notify.templateid.useractivationrequest=placeholder-activation-request-template-id
notify.apikey=placeholder-api-key

# Login URL
pagesuccess.loginURL=http://localhost:8080/login
